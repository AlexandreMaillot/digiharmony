name: digiharmony_app
description: A Very Good Project created by Very Good CLI.
version: 1.0.0+1
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  app_usage: ^4.1.0
  bloc: ^9.2.0
  bloc_concurrency: ^0.3.0
  drift: ^2.33.0
  equatable: ^2.0.8
  flow_builder: ^0.1.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  formz: ^0.8.0
  hydrated_bloc: ^11.0.0
  intl: ^0.20.2
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  sqlite3_flutter_libs: ^0.6.0+eol
  url_launcher: ^6.3.2

dev_dependencies:
  bloc_lint: ^0.4.1
  bloc_test: ^10.0.0
  bloc_tools: ^0.1.0-dev.24
  build_runner: ^2.15.0
  drift_dev: ^2.33.0
  flutter_native_splash: ^2.4.4
  flutter_test:
    sdk: flutter
  json_serializable: ^6.14.0
  mocktail: ^1.0.5
  sqlite3: any
  very_good_analysis: ^10.2.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
