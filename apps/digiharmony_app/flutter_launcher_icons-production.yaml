# Icone d'app — flavor PRODUCTION (Android adaptatif + iOS AppIcon).
# Genere via : dart run flutter_launcher_icons -f flutter_launcher_icons-production.yaml
# Android : sort dans android/app/src/production/res/ (override production).
# iOS : regenere ios/Runner/Assets.xcassets/AppIcon.appiconset (jeu de prod).
#   `remove_alpha_ios` aplatit la transparence (iOS interdit l'alpha) ;
#   `background_color_ios` = navy #16213C derriere les zones transparentes
#   (evite une bordure noire/blanche). Le visuel plein cadre remplit le cercle
#   adaptatif Android ; meme fond navy derriere.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#16213C"
  image_path: "tool/icon/app_icon_1024.png"
  adaptive_icon_background: "#16213C"
  adaptive_icon_foreground: "tool/icon/app_icon_1024.png"
  min_sdk_android: 21
