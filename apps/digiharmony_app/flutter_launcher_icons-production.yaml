# Icone d'app — flavor PRODUCTION uniquement (Android adaptatif).
# Genere via : dart run flutter_launcher_icons -f flutter_launcher_icons-production.yaml
# Sort dans android/app/src/production/res/ (override production) ; dev/staging/main
# inchanges. iOS NON regenere ici (l'AppIcon.appiconset existant convient — pas de
# bordure blanche sur iOS). Le visuel plein cadre remplit le cercle adaptatif ;
# fond navy #16213C (AppColors.backgroundDeep) derriere (cache car visuel opaque).
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "tool/icon/app_icon_1024.png"
  adaptive_icon_background: "#16213C"
  adaptive_icon_foreground: "tool/icon/app_icon_1024.png"
  min_sdk_android: 21
